<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создать новость</title>
    <link rel="stylesheet" href="css/create-news.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Создать новость</h1>
        <a href="news.html" class="btn">← Назад к новостям</a>
      </header>

      <main>
        <form id="createNewsForm" class="news-form">
          <div class="form-group">
            <label for="title">Заголовок</label>
            <input
              type="text"
              id="title"
              required
              placeholder="Введите заголовок новости"
            />
          </div>

          <div class="form-group">
            <label for="category">Категория</label>
            <select id="category" required>
              <option value="">Выберите категорию</option>
            </select>
          </div>

          <div class="form-group">
            <label for="hashtags">Хэштеги (через запятую)</label>
            <input
              type="text"
              id="hashtags"
              placeholder="например: футбол, лигачемпионов, трансферы"
            />
            <small
              >Хэштеги будут автоматически преобразованы в нижний регистр</small
            >
          </div>

          <div class="form-group">
            <label for="content">Текст новости</label>
            <textarea
              id="content"
              rows="10"
              required
              placeholder="Введите текст новости..."
            ></textarea>
          </div>

          <div class="form-group">
            <label for="image">Изображение (необязательно)</label>
            <div class="file-input-wrapper">
              <input
                type="file"
                id="image"
                accept="image/*"
                onchange="updateFileName(this)"
              />
              <label for="image" class="file-label">Выбрать изображение</label>
              <span id="file-name" class="file-name">Файл не выбран</span>
            </div>
            <small>Максимальный размер 5MB</small>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">
              Отправить на модерацию
            </button>
          </div>
        </form>
      </main>
    </div>

    <script src="js/create-news.js"></script>
  </body>
</html>
